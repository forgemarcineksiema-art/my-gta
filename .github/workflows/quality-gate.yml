name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex/**
  workflow_dispatch:

jobs:
  ci:
    name: Windows CI
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run quality gate
        run: .\tools\ci_verify.ps1 -Preset ci
